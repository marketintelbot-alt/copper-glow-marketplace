databases:
  - name: copper-glow-db
    plan: free
    databaseName: copper_glow
    user: copper_glow

services:
  - type: web
    name: copper-glow-marketplace
    runtime: node
    plan: free
    autoDeploy: true
    healthCheckPath: /
    buildCommand: npm ci && npx prisma generate && npx prisma db push && npm run db:seed:if-empty && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: copper-glow-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: CAPACITOR_SERVER_URL
        sync: false
